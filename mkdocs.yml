site_name: My Brain
site_description: Personal knowledge base for programming languages and interview notes.
site_url: https://alejandrosaezpz.github.io/my-brain/
repo_name: alejandrosaezpz/my-brain
repo_url: https://github.com/alejandrosaezpz/my-brain

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    logo: material/book-education
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: red
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alejandrosaezpz/my-brain
      name: GitHub repository

nav:
  - Home: index.md
  - Languages:
      - Languages overview: Languages/index.md
      - Java:
          - Java overview: Languages/Java/index.md
          - 01. Java Basics: Languages/Java/01-java-basics.md
          - 02. Big O: Languages/Java/02-big-o.md
          - 03. Arrays: Languages/Java/03-arrays.md
          - 04. Strings: Languages/Java/04-strings.md
          - 05. HashMap & HashSet: Languages/Java/05-hashmap-hashset.md
          - 06. ArrayList & Java Collections: Languages/Java/06-arraylist-java-collections.md
          - 07. Stack, Queue & Deque: Languages/Java/07-stack-queue-deque.md
          - 08. Sorting: Languages/Java/08-sorting.md
          - 09. Two Pointers: Languages/Java/09-two-pointers.md
          - 10. Sliding Window: Languages/Java/10-sliding-window.md
          - 11. Prefix Sum: Languages/Java/11-prefix-sum.md
          - 12. Binary Search: Languages/Java/12-binary-search.md
          - 13. Recursion: Languages/Java/13-recursion.md
          - 14. Linked List: Languages/Java/14-linked-list.md
          - 15. Trees: Languages/Java/15-trees.md
          - 16. Heap & PriorityQueue: Languages/Java/16-heap-priorityqueue.md
          - 17. Graphs: Languages/Java/17-graphs.md
          - 18. Backtracking: Languages/Java/18-backtracking.md
          - 19. Dynamic Programming: Languages/Java/19-dynamic-programming.md
          - 20. Bit Manipulation: Languages/Java/20-bit-manipulation.md
          - 21. Greedy: Languages/Java/21-greedy.md
          - 22. Mock Assessments: Languages/Java/22-mock-assessments.md
          - 23. Interview Patterns: Languages/Java/23-interview-patterns.md
          - 24. Java Interview Cheat Sheet: Languages/Java/24-java-interview-cheat-sheet.md
          - Complexity Cheat Sheet: Languages/Java/complexity-cheatsheet.md
      - JavaScript:
          - JavaScript overview: Languages/JavaScript/index.md
          - 01. Introduction: Languages/JavaScript/01-introduction.md
          - 02. Syntax & Fundamentals: Languages/JavaScript/02-syntax-fundamentals.md
          - 03. Arrays: Languages/JavaScript/03-arrays.md
          - 04. Objects: Languages/JavaScript/04-objects.md
          - 05. Strings: Languages/JavaScript/05-strings.md
          - 06. Map & Set: Languages/JavaScript/06-map-set.md
          - 07. Functions: Languages/JavaScript/07-functions.md
          - 08. Asynchronous JavaScript: Languages/JavaScript/08-asynchronous-javascript.md
          - 09. DOM: Languages/JavaScript/09-dom.md
          - 10. JSON: Languages/JavaScript/10-json.md
          - 11. Error Handling: Languages/JavaScript/11-error-handling.md
          - 12. ES6+: Languages/JavaScript/12-es6-plus.md
          - 13. JavaScript Interview Cheat Sheet: Languages/JavaScript/13-javascript-cheat-sheet.md
          - 14. JavaScript Interview Patterns: Languages/JavaScript/14-javascript-interview-patterns.md
          - 15. JavaScript Coding Assessments: Languages/JavaScript/15-javascript-coding-assessments.md
          - 16. Frontend Foundations: Languages/JavaScript/16-frontend-foundations.md
          - 17. JavaScript vs Java: Languages/JavaScript/17-javascript-vs-java.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
